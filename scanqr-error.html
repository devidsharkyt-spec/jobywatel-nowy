<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>mObywatel</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            margin: 0;
            min-height: 100dvh;
            overflow: hidden;
            background: #101318;
        }

        .stage {
            position: fixed;
            left: 50%;
            top: 50%;
            --ratio: 0.449025;
            height: min(100dvh, calc(100vw / var(--ratio)), 1358px);
            aspect-ratio: var(--ratio);
            margin: 0 auto;
            overflow: hidden;
            background: #101318;
            transform: translate(-50%, -50%);
        }

        .screen-png {
            position: absolute;
            inset: 0;
            z-index: 1;
            display: block;
            width: 100%;
            height: 100%;
            object-fit: fill;
            pointer-events: none;
            user-select: none;
            transition: opacity 120ms ease;
        }

        .hotspot {
            position: absolute;
            z-index: 10;
            border: 0;
            padding: 0;
            background: transparent;
            color: transparent;
            cursor: pointer;
        }

        .close-top-zone {
            left: 3%;
            top: 1.6%;
            width: 13%;
            height: 7%;
        }

        .retry-zone {
            left: 4%;
            top: 84.5%;
            width: 92%;
            height: 6.8%;
        }

        .close-bottom-zone {
            left: 4%;
            top: 92.0%;
            width: 92%;
            height: 6.5%;
        }

        .loading-layer {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            place-items: center;
            background: #101318;
        }

        body.loading .loading-layer {
            display: grid;
        }

        body.loading .screen-png,
        body.loading .hotspot {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 72px;
            height: 72px;
            border: 7px solid rgba(0, 122, 255, 0.22);
            border-top-color: #0a84ff;
            border-radius: 50%;
            animation: spin 900ms linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body class="loading">
    <main class="stage">
        <img class="screen-png" src="assets/qr-error-1220x2717.png?v=1" alt="">
        <button class="hotspot close-top-zone" type="button" data-close aria-label="Zamknij"></button>
        <button class="hotspot retry-zone" type="button" id="retryButton" aria-label="Sprobuj ponownie"></button>
        <button class="hotspot close-bottom-zone" type="button" data-close aria-label="Zamknij"></button>
    </main>

    <div class="loading-layer" aria-hidden="true">
        <div class="spinner"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        function withParams(file) {
            const query = params.toString();
            return file + (query ? "?" + query : "");
        }

        function showError() {
            document.body.classList.remove("loading");
        }

        var loadingTimer = null;

        function startLoadingCycle() {
            if (loadingTimer) {
                clearTimeout(loadingTimer);
            }
            document.body.classList.add("loading");
            loadingTimer = setTimeout(showError, 2000);
        }

        document.querySelectorAll("[data-close]").forEach((button) => {
            button.addEventListener("click", () => {
                window.location.href = withParams("qr.html");
            });
        });

        document.getElementById("retryButton").addEventListener("click", startLoadingCycle);
        startLoadingCycle();
    </script>
</body>
</html>
