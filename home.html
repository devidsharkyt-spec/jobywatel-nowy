<!DOCTYPE html>
<html lang="pl">
<head>
    <title>mObywatel</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/home.css?v=3.2">
    <link rel="stylesheet" href="assets/main.css?v=2.3">
    <link rel="icon" type="image/x-icon" href="https://i.imgur.com/U7TRg0V.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/U7TRg0V.png">
    <link rel="shortcut icon" href="https://i.imgur.com/U7TRg0V.png">
    <meta name="theme-color" content="#121212">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="documents_png_stage" aria-label="Dokumenty">
        <img class="documents_png_screen" src="assets/dokumenty-v2-theme.png?v=2" alt="">
        <button class="documents_hotspot doc_mdowod_hotspot" type="button" onclick="sendTo('card')" aria-label="mDowód"></button>
        <button class="documents_hotspot doc_student_hotspot" type="button" onclick="sendTo('student')" aria-label="Legitymacja szkolna"></button>
        <button class="documents_hotspot doc_add_hotspot" type="button" aria-label="Dodaj dokument"></button>
        <button class="documents_hotspot nav_docs_hotspot" type="button" onclick="sendTo('home')" aria-label="Dokumenty"></button>
        <button class="documents_hotspot nav_services_hotspot" type="button" onclick="sendTo('services')" aria-label="Usługi"></button>
        <button class="documents_hotspot nav_qr_hotspot" type="button" onclick="sendTo('qr')" aria-label="Kod QR"></button>
        <button class="documents_hotspot nav_search_hotspot" type="button" onclick="sendTo('search')" aria-label="Szukaj"></button>
        <button class="documents_hotspot nav_more_hotspot" type="button" onclick="sendTo('more')" aria-label="Więcej"></button>
    </div>

    <div class="bottom_bar">
        <div class="bottom_bar_grid">
            <div class="bottom_element_grid" send="home">
                <div class="bottom_element_image home_open home"></div>
                <p class="bottom_element_text open">Dokumenty</p>
            </div>
            <div class="bottom_element_grid" send="services">
                <div class="bottom_element_image services"></div>
                <p class="bottom_element_text">Usługi</p>
            </div>
            <div class="bottom_element_grid" send="qr">
                <div class="bottom_element_image qr"></div>
                <p class="bottom_element_text">Kod QR</p>
            </div>
            <div class="bottom_element_grid" send="search">
                <div class="bottom_element_image search_nav"></div>
                <p class="bottom_element_text">Szukaj</p>
            </div>
            <div class="bottom_element_grid" send="more">
                <div class="bottom_element_image more"></div>
                <p class="bottom_element_text">Więcej</p>
            </div>
        </div>
    </div>

    <main class="container">
        <div class="top_grid">
            <img src="https://i.imgur.com/30pODeI.png" class="top_image" alt="">
            <img src="https://i.imgur.com/pBv3be9.png" class="top_image right" alt="">
        </div>

        <div class="card_grid">
            <p class="title">Dokumenty</p>
            <button type="button" class="subtitle plain_button">Dostosuj</button>
            <button type="button" class="subtitle plain_button add_document_button">Dodaj</button>
        </div>

        <section class="stack" aria-label="Dokumenty">
            <div class="card mdowod_card" onclick="sendTo('card')">
                <img class="card_image" src="assets/card-mdowod-demo.png?v=14" alt="">
            </div>

            <div class="card student_card" data-student-card onclick="sendTo('student')">
                <img class="card_image" src="assets/card-student-demo.png?v=14" alt="">
            </div>
        </section>

        <section class="add_panel" data-add-panel>
            <div class="add_panel_header">
                <p>Dodaj dokument</p>
                <button type="button" data-close-add-panel>×</button>
            </div>
            <button type="button" class="add_document_item" data-add-student>
                <span class="add_icon">+</span>
                <span>
                    <strong>Legitymacja szkolna</strong>
                    <small>Dodaj dokument do listy</small>
                </span>
            </button>
        </section>
    </main>

    <script src="assets/bar.js?v=2.0"></script>
    <script src="assets/manifest.js"></script>
    <script src="assets/home.js?v=2.1"></script>
</body>
</html>
