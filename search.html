<!DOCTYPE html>
<html lang="pl">
<head>
    <title>mObywatel</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="assets/search.css?v=1.0">
    <link rel="stylesheet" href="assets/main.css?v=2.3">
    <link rel="icon" type="image/x-icon" href="https://i.imgur.com/U7TRg0V.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/U7TRg0V.png">
    <link rel="shortcut icon" href="https://i.imgur.com/U7TRg0V.png">
    <meta name="theme-color" content="#121212">
    <meta name="format-detection" content="telephone=no">
    <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="bottom_bar">
        <div class="bottom_bar_grid">
            <div class="bottom_element_grid" send="home">
                <div class="bottom_element_image home"></div>
                <p class="bottom_element_text">Dokumenty</p>
            </div>
            <div class="bottom_element_grid" send="services">
                <div class="bottom_element_image services"></div>
                <p class="bottom_element_text">Usługi</p>
            </div>
            <div class="bottom_element_grid" send="qr">
                <div class="bottom_element_image qr"></div>
                <p class="bottom_element_text">Kod QR</p>
            </div>
            <div class="bottom_element_grid" send="search">
                <div class="bottom_element_image search_nav search_open"></div>
                <p class="bottom_element_text open">Szukaj</p>
            </div>
            <div class="bottom_element_grid" send="more">
                <div class="bottom_element_image more"></div>
                <p class="bottom_element_text">Więcej</p>
            </div>
        </div>
    </div>

    <main class="search_page">
        <div class="search_header">
            <img class="search_logo" src="assets/mobywatel-app-icon.png" alt="">
            <p class="search_title">Szukaj</p>
        </div>

        <label class="search_box" for="searchInput">
            <span class="search_box_icon" aria-hidden="true"></span>
            <input id="searchInput" class="search_input" type="search" autocomplete="off" placeholder="Wpisz szukaną frazę">
        </label>

        <section class="search_results" id="searchResults" aria-live="polite"></section>
    </main>

    <script src="assets/bar.js?v=2.0"></script>
    <script src="assets/search.js?v=1.0"></script>
    <script src="assets/manifest.js"></script>
</body>
</html>
